<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Image Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-section {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Test Image Upload</h1>
    
    <div class="upload-section">
        <h3>Upload Profile Image</h3>
        <input type="file" id="imageInput" accept="image/*" />
        <br><br>
        <button onclick="uploadImage()" id="uploadBtn">Upload Image</button>
        <button onclick="getProfile()" id="profileBtn">Get Profile</button>
        <button onclick="deleteImage()" id="deleteBtn">Delete Image</button>
    </div>
    
    <div id="result"></div>
    
    <div id="profileInfo"></div>

    <script>
        // You'll need to replace this with a real JWT token from your authentication
        const TEST_TOKEN = 'your-jwt-token-here';
        
        function showResult(message, isError = false) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.className = 'result ' + (isError ? 'error' : 'success');
        }
        
        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];
            
            if (!file) {
                showResult('Please select an image file', true);
                return;
            }
            
            const formData = new FormData();
            formData.append('profileImage', file);
            
            try {
                const response = await fetch('http://localhost:5000/api/upload/profile-image', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TEST_TOKEN}`,
                    },
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showResult(`Upload successful: ${result.message}`);
                } else {
                    showResult(`Upload failed: ${result.error}`, true);
                }
            } catch (error) {
                showResult(`Upload error: ${error.message}`, true);
            }
        }
        
        async function getProfile() {
            try {
                const response = await fetch('http://localhost:5000/api/upload/profile', {
                    headers: {
                        'Authorization': `Bearer ${TEST_TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('profileInfo').innerHTML = `
                        <h3>Profile Information</h3>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                    showResult('Profile loaded successfully');
                } else {
                    showResult(`Profile load failed: ${result.error}`, true);
                }
            } catch (error) {
                showResult(`Profile load error: ${error.message}`, true);
            }
        }
        
        async function deleteImage() {
            try {
                const response = await fetch('http://localhost:5000/api/upload/profile-image', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${TEST_TOKEN}`,
                    }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showResult(`Delete successful: ${result.message}`);
                } else {
                    showResult(`Delete failed: ${result.error}`, true);
                }
            } catch (error) {
                showResult(`Delete error: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
